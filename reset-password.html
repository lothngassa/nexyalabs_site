<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Réinitialiser le mot de passe - NEXYA AI</title>
<meta name="theme-color" content="#09090f"/>
<link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32.png"/>
<link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090f; --bg2:#111118; --bg3:#1a1a26;
  --primary:#2E9BF0; --pr:46,155,240; --gold:#E8A020;
  --text:#f0f0ff; --text2:#a6a6c2; --text3:#7a7a98;
  --border:rgba(255,255,255,.07); --border2:rgba(255,255,255,.11);
  --ok:#28c76f; --err:#ff5b6e;
  --rmd:14px; --rlg:20px; --rpill:100px; --t:.3s;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-glow::before{content:'';position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:760px;height:520px;background:radial-gradient(ellipse,rgba(var(--pr),.10) 0%,transparent 70%)}
.bg-glow::after{content:'';position:absolute;bottom:-160px;left:10%;width:420px;height:420px;background:radial-gradient(circle,rgba(232,160,32,.06) 0%,transparent 65%)}
.card{position:relative;z-index:1;width:100%;max-width:440px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rlg);padding:38px 30px;box-shadow:0 24px 60px rgba(0,0,0,.4)}
.logo{width:58px;height:58px;border-radius:16px;background:linear-gradient(135deg,var(--primary),var(--gold));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:26px;margin:0 auto 22px;box-shadow:0 10px 36px rgba(var(--pr),.3)}
h1{font-size:23px;font-weight:800;text-align:center;margin-bottom:8px}
.sub{font-size:14px;color:var(--text2);text-align:center;margin-bottom:26px}
label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin:16px 0 7px}
input{width:100%;padding:13px 15px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rmd);color:var(--text);font-size:15px;font-family:inherit;transition:border-color var(--t)}
input:focus{outline:none;border-color:var(--primary)}
.rules{margin:14px 0 4px;font-size:12.5px;color:var(--text3);list-style:none}
.rules li{margin:3px 0;transition:color var(--t)}
.rules li::before{content:'○ ';color:var(--text3)}
.rules li.ok{color:var(--ok)}
.rules li.ok::before{content:'● ';color:var(--ok)}
button{width:100%;margin-top:22px;padding:14px;border:none;border-radius:var(--rpill);background:linear-gradient(135deg,var(--primary),var(--gold));color:#fff;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;transition:transform var(--t),opacity var(--t)}
button:hover:not(:disabled){transform:translateY(-1px)}
button:disabled{opacity:.5;cursor:not-allowed}
.msg{margin-top:18px;padding:13px 15px;border-radius:var(--rmd);font-size:14px;display:none}
.msg.show{display:block}
.msg.ok{background:rgba(40,199,111,.12);border:1px solid rgba(40,199,111,.3);color:var(--ok)}
.msg.err{background:rgba(255,91,110,.12);border:1px solid rgba(255,91,110,.3);color:var(--err)}
.center-state{text-align:center}
.center-state .ico{font-size:46px;margin-bottom:14px}
.foot{margin-top:26px;text-align:center;font-size:12px;color:var(--text3);letter-spacing:.5px}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="card">
  <div class="logo">N</div>
  <div id="content"></div>
  <div class="foot">NEXYA AI - Nexyalabs</div>
</div>
<script>
const API = 'https://api.nexyalabs.com';
const token = new URLSearchParams(location.search).get('token');
const content = document.getElementById('content');

function centerState(ico, title, text){
  content.innerHTML = '<div class="center-state"><div class="ico">' + ico + '</div><h1>' + title + '</h1><p class="sub">' + text + '</p></div>';
}

if (!token) {
  centerState('⚠️', 'Lien invalide', "Ce lien de réinitialisation est incomplet ou a déjà été utilisé. Redemande une réinitialisation depuis l'application NEXYA.");
} else {
  content.innerHTML =
    '<h1>Nouveau mot de passe</h1>' +
    '<p class="sub">Choisis un nouveau mot de passe pour ton compte NEXYA.</p>' +
    '<label for="pw">Nouveau mot de passe</label>' +
    '<input id="pw" type="password" autocomplete="new-password" placeholder="••••••••" />' +
    '<ul class="rules">' +
      '<li id="r-len">Au moins 8 caractères</li>' +
      '<li id="r-up">Une majuscule</li>' +
      '<li id="r-low">Une minuscule</li>' +
      '<li id="r-dig">Un chiffre</li>' +
    '</ul>' +
    '<label for="pw2">Confirme le mot de passe</label>' +
    '<input id="pw2" type="password" autocomplete="new-password" placeholder="••••••••" />' +
    '<button id="submit" disabled>Réinitialiser</button>' +
    '<div id="msg" class="msg"></div>';

  const pw = document.getElementById('pw');
  const pw2 = document.getElementById('pw2');
  const btn = document.getElementById('submit');
  const msg = document.getElementById('msg');
  const rules = { len: v => v.length >= 8, up: v => /[A-Z]/.test(v), low: v => /[a-z]/.test(v), dig: v => /\d/.test(v) };

  function check(){
    const v = pw.value;
    let allok = true;
    for (const k in rules){
      const ok = rules[k](v);
      document.getElementById('r-' + k).classList.toggle('ok', ok);
      if (!ok) allok = false;
    }
    btn.disabled = !(allok && v.length <= 128 && v.length > 0 && pw2.value === v);
    return allok;
  }
  pw.addEventListener('input', check);
  pw2.addEventListener('input', check);

  btn.addEventListener('click', async () => {
    msg.className = 'msg';
    btn.disabled = true;
    btn.textContent = 'Envoi...';
    try {
      const r = await fetch(API + '/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token, new_password: pw.value })
      });
      const j = await r.json().catch(() => ({}));
      if (r.ok && j.success !== false) {
        centerState('✅', 'Mot de passe modifié', "C'est fait. Retourne dans l'application NEXYA et connecte-toi avec ton nouveau mot de passe.");
      } else {
        const code = (j && j.code) || '';
        if (code.indexOf('EXPIRED') !== -1 || code.indexOf('INVALID') !== -1) {
          msg.textContent = "Ce lien a expiré ou n'est plus valide. Redemande une réinitialisation depuis l'application NEXYA.";
        } else if (r.status === 422) {
          msg.textContent = "Mot de passe non conforme. Vérifie les critères ci-dessus.";
        } else {
          msg.textContent = (j && j.error) || "Une erreur est survenue. Réessaie dans un instant.";
        }
        msg.classList.add('show', 'err');
        btn.disabled = false;
        btn.textContent = 'Réinitialiser';
      }
    } catch (e) {
      msg.textContent = "Impossible de joindre le serveur. Vérifie ta connexion et réessaie.";
      msg.classList.add('show', 'err');
      btn.disabled = false;
      btn.textContent = 'Réinitialiser';
    }
  });
}
</script>
</body>
</html>
